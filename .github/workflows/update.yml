name: Update Sector Data

# Esegue lo script ogni giorno alle 22:00 UTC (dopo chiusura mercato USA)
# dal lunedì al venerdì. Puoi anche lanciarlo a mano dalla tab Actions.
on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'Sector Bot'
          git config --global user.email 'bot@users.noreply.github.com'
          git add data/sector_data.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai dati"
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
